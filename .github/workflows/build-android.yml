name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix react-native-ble-advertiser SDK version
        run: |
          BLE_GRADLE="node_modules/react-native-ble-advertiser/android/build.gradle"
          sed -i 's/compileSdkVersion 28/compileSdkVersion 36/g' $BLE_GRADLE
          sed -i "s/buildToolsVersion '28.0.3'/buildToolsVersion '36.0.0'/g" $BLE_GRADLE
          sed -i 's/targetSdkVersion 28/targetSdkVersion 36/g' $BLE_GRADLE
          sed -i 's/minSdkVersion 16/minSdkVersion 24/g' $BLE_GRADLE
          echo "Patched BLE advertiser build.gradle:"
          cat $BLE_GRADLE

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: attendance-radar-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
